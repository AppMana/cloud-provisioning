# Cluster-side WireGuard dialer. Runs as a DaemonSet (hostNetwork,
# NET_ADMIN) so every node brings up a wg0 to the cloud worker — a flat
# tunnel mesh, which keeps Calico's node-to-node BGP mesh working with
# nothing to configure (each node advertises its own IPAM block,
# next-hop = its own now-reachable node IP).
#
# The dialer is deliberately NOT a smart controller: it holds a static
# WireGuard config with PersistentKeepalive and re-handshakes on its own,
# independent of Kubernetes control-loop health. That independence is the
# whole point — the tunnel is the node's only path to the API, so it must
# not depend on the API to stay up.
#
# `peer-endpoint` is kept current by ../../controller/ (deployed via
# controller.yaml in this directory), which watches core CAPI Machine
# objects -- not AWSMachine, so it doesn't care which infrastructure
# provider is underneath -- and patches this key from
# Machine.status.addresses whenever it changes. peer-public-key and
# dialer-private-key are set once, out of band, and never touched by the
# controller.
apiVersion: v1
kind: Secret
metadata:
  name: wg-dialer-peer
  namespace: wg-dialer
stringData:
  peer-public-key: "<node-public-key>"
  peer-endpoint: "<node-public-ip>:51820"   # kept live by the controller after bootstrap
  dialer-private-key: "<cluster-dialer-private-key>"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wg-dialer
  namespace: wg-dialer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wg-dialer-read-secret
  namespace: wg-dialer
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["wg-dialer-peer"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wg-dialer-read-secret
  namespace: wg-dialer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wg-dialer-read-secret
subjects:
  - kind: ServiceAccount
    name: wg-dialer
    namespace: wg-dialer
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wg-dialer
  namespace: wg-dialer
spec:
  selector:
    matchLabels:
      app: wg-dialer
  template:
    metadata:
      labels:
        app: wg-dialer
    spec:
      hostNetwork: true
      serviceAccountName: wg-dialer
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: dialer
          image: <wg-dialer-image>   # controller/Dockerfile --target dialer
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          args:
            - --secret-namespace=wg-dialer
            - --secret-name=wg-dialer-peer
            - --iface=wg0
            - --local-address=10.100.0.1/24
            - --allowed-ips=10.100.0.0/24,10.101.130.0/24
            - --keepalive-seconds=15
            - --mtu=1420
            - --poll-interval=30s
