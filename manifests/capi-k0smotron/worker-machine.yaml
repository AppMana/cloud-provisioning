# Template: one cloud VM joined to an existing k0s cluster as a worker.
#
# Composes three existing controllers (all run in the target cluster):
#   - Cluster API core (Machine)
#   - CAPA / cluster-api-provider-aws (AWSMachine) — the infrastructure
#   - k0smotron bootstrap provider (K0sWorkerConfig) — the join + WG setup
#
# Placeholders in <angle brackets> are cluster/site specific. The AWS
# fields are the only provider-coupled part; swapping to another CAPI
# infrastructure provider replaces only the AWSMachine.
apiVersion: cluster.x-k8s.io/v1beta1
kind: Machine
metadata:
  name: cloud-worker-0
  namespace: default
  labels:
    cluster.x-k8s.io/cluster-name: <cluster-name>
spec:
  clusterName: <cluster-name>
  bootstrap:
    configRef:
      apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
      kind: K0sWorkerConfig
      name: cloud-worker-0
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
    kind: AWSMachine
    name: cloud-worker-0
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: K0sWorkerConfig
metadata:
  name: cloud-worker-0
  namespace: default
spec:
  version: v1.36.2+k0s.0
  # The bootstrap provider generates the join token + cloud-init. These
  # additions bring up the WireGuard listener and gate the k0s join on
  # the API VIP becoming reachable over the tunnel (the cluster dials in
  # from its side; this node only listens).
  files:
    - path: /etc/wireguard/wg0.conf
      permissions: "0600"
      # Private key injected here (pre-generated per node); the cluster
      # side holds the matching public key + this node's public IP.
      content: |
        [Interface]
        Address = 10.100.0.<N>/24
        ListenPort = 51820
        PrivateKey = <node-private-key>
        [Peer]
        PublicKey = <cluster-dialer-public-key>
        AllowedIPs = 10.100.0.0/24, 10.101.0.0/16
        # No Endpoint: the cluster dials this node.
  preStartCommands:
    - "apt-get update && apt-get install -y wireguard-tools"
    - "wg-quick up wg0"
    # Gate the join: do not contact the API until the tunnel is up.
    - "until ping -c1 -W2 10.101.0.1 >/dev/null 2>&1; do sleep 2; done"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachine
metadata:
  name: cloud-worker-0
  namespace: default
spec:
  instanceType: t4g.small
  # arm64 image; region/zone per site (Hong Kong: ap-east-1).
  ami:
    id: <arm64-ubuntu-ami-id>
  # Standalone/externally-managed: this cluster's control plane is NOT
  # CAPI-managed, so the security group + subnet are supplied directly
  # rather than derived from an AWSCluster.
  securityGroupOverrides:
    node: <sg-id-allowing-22-80-443-udp51820>
  subnet:
    id: <subnet-id>
  publicIP: true
  sshKeyName: <keypair-name>
